# ============================================================
# ci.yml — GitHub Actions CI Pipeline
# INT332 DevOps Pipeline Project — Unit V
# Triggers: push to main/dev, pull requests to main
# Jobs: build → test → docker-build → docker-push → security-scan
# ============================================================

name: CI Pipeline - Student App

# ---- TRIGGERS (Unit V: Workflow triggers) ----
on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main

# ---- ENVIRONMENT VARIABLES ----
env:
  IMAGE_NAME: student-app
  DOCKER_HUB_REPO: ${{ secrets.DOCKER_HUB_USERNAME }}/student-app

# ============================================================
# JOBS
# ============================================================
jobs:

  # ---- JOB 1: Build & Test ----
  build-and-test:
    name: Maven Build and Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # Cache Maven dependencies — faster builds (Unit V)
      - name: Cache Maven dependencies
        uses: actions/cache@v3
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-

      - name: Build with Maven (validate → compile → test → package)
        run: mvn clean package -B

      - name: Run unit tests
        run: mvn test -B

      - name: Upload Surefire test reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-reports
          path: target/surefire-reports/
          retention-days: 7

      - name: Upload JAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: student-app-jar
          path: target/student-app-*.jar
          retention-days: 7

  # ---- JOB 2: Docker Build & Push to Docker Hub only ----
  docker-build-push:
    name: Docker Build and Push
    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Login to Docker Hub using secrets (Unit V: secrets management)
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}

      # Build and push to Docker Hub only
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKER_HUB_USERNAME }}/student-app:1.0.0
            ${{ secrets.DOCKER_HUB_USERNAME }}/student-app:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ---- JOB 3: Trivy Security Scan (DevSecOps Bonus) ----
  security-scan:
    name: Trivy Security Scan
    runs-on: ubuntu-latest
    needs: docker-build-push
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ secrets.DOCKER_HUB_USERNAME }}/student-app:latest
          format: 'table'
          exit-code: '0'
          ignore-unfixed: true
          severity: 'CRITICAL,HIGH'

  # ---- JOB 4: Matrix Strategy (Unit V) ----
  multi-platform-test:
    name: Multi-Platform Test (Java ${{ matrix.java }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        java: [17, 21]
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK ${{ matrix.java }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ matrix.java }}
          distribution: 'temurin'
      - name: Cache Maven
        uses: actions/cache@v3
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ matrix.java }}-${{ hashFiles('**/pom.xml') }}
      - name: Build on Java ${{ matrix.java }}
        run: mvn clean compile -B